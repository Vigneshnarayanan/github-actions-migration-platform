name: Migration Workflow Executor

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'Application name to migrate'
        required: true
      dry_run:
        description: 'Perform a dry run'
        required: false
        default: 'false'

jobs:
  migrate:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Analyze application
        run: npm run analyze -- ${{ github.event.inputs.app_name }}
      
      - name: Migrate application
        run: npm run migrate -- ${{ github.event.inputs.app_name }} --dry-run=${{ github.event.inputs.dry_run }}
      
      - name: Upload migration report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: migration-report-${{ github.event.inputs.app_name }}
          path: reports/
